name: smart_campus_app
description: "Smart Campus Complaint and Suggestion Platform — Bahir Dar University Student Union."
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.0.0

  # Architecture & state
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  equatable: ^2.0.7

  # Networking & utilities
  intl: ^0.20.2
  uuid: ^4.5.3
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.4

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
